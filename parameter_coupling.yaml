# ===================================================================================================================
#  USER GUIDE – HOW TO USE THIS CONFIGURATION FILE
# ===================================================================================================================
# -------------------------------------------------------------------------------------------------------------------
#  CONFIG FILE USAGE
# -------------------------------------------------------------------------------------------------------------------
#
#  IMPORTANT:
#  The name of this YAML configuration file must be correctly specified
#  inside the main Python script.
#
#  Example in main.py:
#
#      processing("parameter_coupling.yaml")
#
#  If the filename does not match exactly (including extension),
#  the program will not be able to load the configuration and run correctly.
#
#  Make sure:
#      • The file name is correct
#      • The file is located in the expected directory
#      • The extension (.yaml or .yml) matches the one used in the code
#
# -------------------------------------------------------------------------------------------------------------------
#  BOOLEAN PARAMETERS
#  ---------------------------------------------------------------------------------------------------------------
#  true   → activates the feature
#  false  → deactivates the feature
#
#  Example:
#      flame_speed: true
#
# -------------------------------------------------------------------------------------------------------------------
#  NUMERICAL PARAMETER INITIALIZATION
# -------------------------------------------------------------------------------------------------------------------
#  Each thermodynamic parameter (temperature, pressure, equivalence ratio, etc.)
#  must be defined using one of the following modes:
#
#  1) single     → Single fixed value
#       mode: single
#       value: 300
#
#  2) list       → Explicit list of values
#       mode: list
#       values: [300, 400, 500]
#
#  3) linspace   → Automatic generation of evenly spaced values
#       mode: linspace
#       start: 300
#       end: 1000
#       points: 5
#
#       → Equivalent to numpy.linspace(start, end, points)
#
# -------------------------------------------------------------------------------------------------------------------
#  COUNTER-FLOW SPECIFIC PARAMETERS
# -------------------------------------------------------------------------------------------------------------------
#  temperature_pairs:
#      List of temperature couples defined as:
#      [fuel_temperature, oxidizer_temperature]
#
#      Example:
#          temperature_pairs:
#              - [300, 400]
#              - [350, 450]
#
#  Velocity_flux_pairs:
#      List of mass flux couples defined as:
#      [fuel_mass_flux, oxidizer_mass_flux]  (kg/m²/s)
#
# -------------------------------------------------------------------------------------------------------------------
#  MAJOR SPECIES AND RADICALS INITIALIZATION
# -------------------------------------------------------------------------------------------------------------------
#
#  Some simulations (e.g., Counter-flow, Flame_1D) allow tracking selected species for detailed output.
#  These are divided into:
#      - Major species : main chemical species of interest (e.g., O2, H2, H2O)
#      - Radicals      : reactive intermediates (e.g., OH, H2O2)
#
#  Initialization rules:
#      • Define each list explicitly under the corresponding simulation type in the 'outputs' section.
#      • Ensure that the species names match exactly those defined in the kinetic mechanism.
#      • Lists should be in YAML array format, for example:
#
#          Counter_flow:
#              Major_species:
#                - O2
#                - H2
#                - H2O
#              Radicals:
#                - OH
#                - H2O2
#
#      • Only species included in these lists will be saved in the post-processed outputs.
#      • Adding a species that does not exist in the mechanism will plot a WARNING and will be 
#       not use.
#
# -------------------------------------------------------------------------------------------------------------------
#  POST-PROCESSING PARAMETERS
# -------------------------------------------------------------------------------------------------------------------
#
#  save_plots:
#      true  → Saves generated plots as image files.
#      false → Does not save plots to disk.
#
#  verbosity_level:
#      Controls the level of console output and live plotting during computation.
#
#      0 → Nothing
#
#      1 → Minimal output
#           - Prints only intermediate information
#
#      2 → Intermediate output
#           - Prints additional intermediate variables
#           - Species concentration
#           - Basic live monitoring during computation
#
#      3 → Maximum output (Full debug mode)
#           - Prints all intermediate variables
#           - Detailed printing of all tracked species
#           - Extended thermodynamic and kinetic information
#           - Intended for debugging and validation
#
#  WARNING:
#      High verbosity levels (especially level 2) may significantly slow down
#      the simulation due to frequent console output and plotting.
#
# -------------------------------------------------------------------------------------------------------------------
#  UNITS CONVENTION
# -------------------------------------------------------------------------------------------------------------------
#  Temperature        → Kelvin (K)
#  Pressure           → bar
#  Equivalence ratio  → dimensionless (-)
#  Mass flux          → kg/m²/s
#
# -------------------------------------------------------------------------------------------------------------------
#  IMPORTANT NOTES
# -------------------------------------------------------------------------------------------------------------------
#  - All parameters are case-sensitive.
#  - Incorrect formatting will stop the simulation at initialization.
#  - Make sure the selected kinetic mechanism exists and is accessible.
#     'GRI30', 'ZHU24','h2o2', 'SANDIEGO', 'STAGNI25', 'STAGNI20'
#
# ===================================================================================================================


# ===================================================================================================================
#  Cantera simulation parameters
# ===================================================================================================================

# ----------------------------------------------------------
# Output file for save
# ----------------------------------------------------------

output:
  directory: /Users/lilian_chapuis/Documents/04-PostProcessing_Result/00-Cantera_Simulation
  #filename: 50-NH3_50-H2_AIR_Simulation1/
  filename: Simple_diffusion_flame_NH3_AIR
  
# ----------------------------------------------------------
# Type of simulations
# ----------------------------------------------------------

simulation:
  type:
    Flame_1D              : false
    Temperature_Adiabatic : false 
    Ignition_Delay_time   : false
    Gas_Composition       : false
    Counter_flow          : true 
    

# ----------------------------------------------------------
# Kinetic Mechanism
# ----------------------------------------------------------

kinetics:
  mechanism-1  : ZHU24  
  #mechanism-2  : STAGNI25  
  #mechanism-3  : STAGNI20  


# ----------------------------------------------------------
# Mixture Definition
# ----------------------------------------------------------

mixture:
  fuel:
    - species   : NH3
      fraction  : 1.0
    - species   : H2
      fraction  : 0.0
    
  oxidizer:
    - species   : O2
      fraction  : 1.0
    - species   : N2
      fraction  : 3.76



# ----------------------------------------------------------
# Outputs
# ----------------------------------------------------------

outputs:

  #------------------------

  Flame_1D:
    flame_speed            : true
    flame_thickness        : true
    flame_time             : true
    emissions              : true
    Major_species:
      - 'O2'
      - 'H2O'
      - 'H2'
      - 'N2'
      - 'NH3'
    Radicals:
      - 'NO'
      - 'NO2'
      - 'OH'
      - 'H2O2'
      - 'HO2'
      - 'H'
      - 'NH2'
     


  #------------------------

  Ignition_Delay_time:
    IDT_plot               : true
    time_evolution         : true
    complementary_plot     : true

  #------------------------

  Temperature_Adiabatic:
    Final_Temperature      : true
    Final_density          : true
    Final_Enthalpy         : true
  #------------------------

  Gas_Composition:
    Fresh_gas              : true
    Burn_gas               : true
  #------------------------

  Counter_flow:
    Extinction_strain      : false
    Basic_diffusion_flame  : true
    Major_species:
      - 'O2'
      - 'H2O'
      - 'H2'
      - 'N2'
      - 'NH3'
    Radicals:
      - 'NO'
      - 'NO2'
      - 'OH'
      - 'H2O2'
      - 'HO2'
      - 'H'
      - 'NH2'
     

# ----------------------------------------------------------
# Operating Conditions
# ----------------------------------------------------------

conditions:

  #------------------------

  Flame_1D:
    Temperature:
      mode   : list
      values : [300,500]

    Pressure:
      mode   : list
      values  : [1.01325,2]

    Phi:
      mode   : linspace
      start  : 0.25
      end    : 2.2
      points : 15

  #------------------------

  Ignition_Delay_time:
    Temperature:
      mode   : linspace
      start  : 800
      end    : 1300
      points : 20

    Pressure:
      mode   : list
      values : [1.01325,2]

    Phi:
      mode   : linspace
      start  : 0.25
      end    : 2.2
      points : 15

  #------------------------

  Temperature_Adiabatic:
    Temperature:
      mode   : list
      values : [300,500]

    Pressure:
      mode   : list
      values : [1.01325,2]

    Phi:
      mode   : linspace
      start  : 0.25
      end    : 2.2
      points : 40

  #------------------------

  Gas_Composition:
    Temperature:
      mode   : list
      values : [300,500]

    Pressure:
      mode   : list
      values : [1.01325,2]

    Phi:
      mode   : linspace
      start  : 0.25
      end    : 2.2
      points : 40

  #------------------------

  Counter_flow:
    Pressure:
      mode   : list
      values : [1.01325,2]

    Temperature_pairs:
      - [300, 300]

    Velocity_flux_pairs:
      - [0.085,0.085]


# ----------------------------------------------------------
# Post Processing
# ----------------------------------------------------------

post_processing:
  save_plots      : true
  verbosity_level : 3








